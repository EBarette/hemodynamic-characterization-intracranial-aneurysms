# Ablation: Modified Fourier Network + ReLoBRaLo adaptive loss weighting.
# ReLoBRaLo (Bischof & Kraus 2021, arXiv:2110.09813) balances constraint losses
# by tracking both short-term (prev step) and long-term (initial step) loss
# ratios with an EMA, preventing any single constraint from dominating training.
# This directly targets the elevated L_flux convergence issue described in the
# thesis chapter 3.

defaults:
  - physicsnemo_default
  - arch:
      - modified_fourier
  - scheduler: tf_exponential_lr
  - optimizer: adam
  - loss: relobralo
  - _self_

arch:
  modified_fourier:
    layer_size: 256
    nr_layers: 4

scheduler:
  decay_rate: 0.95
  decay_steps: 15000

# ReLoBRaLo hyperparameters
# alpha: EMA decay for lambda update (0.95 = slow, stable adaptation)
# beta:  probability of "lookback" reset to initial losses (0.99 = rare reset)
# tau:   temperature scaling of loss ratios (1.0 = no scaling)
loss:
  alpha: 0.95
  beta: 0.99
  tau: 1.0
  eps: 1.0e-8

network_dir: "checkpoint_mf_relobralo"

training:
  rec_results_freq: 10000
  rec_constraint_freq: 50000
  max_steps: 1500000

batch_size:
  inlet: 700
  outlet: 400
  no_slip: 3000
  interior: 3500
  integral_continuity: 200

custom:
  stl_dir: "./stl_files/0203_k1"

  nu: 0.00025
  inlet_vel: 0.375
  auto_inlet_npoints: 20000
  integral_lambda: 0.2
