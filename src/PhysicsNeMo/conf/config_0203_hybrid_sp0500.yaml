# Patient 0203 - HYBRID PINN sparsity sweep (samples_per_step=0500).
# See config_0203_hybrid.yaml for the main run (SP2000).
defaults:
  - physicsnemo_default
  - arch:
      - modified_fourier
  - scheduler: tf_exponential_lr
  - optimizer: adam
  - loss: relobralo
  - _self_

arch:
  modified_fourier:
    layer_size: 256
    nr_layers: 4

scheduler:
  decay_rate: 0.95
  decay_steps: 15000

loss:
  alpha: 0.95
  beta: 0.99
  tau: 1.0
  eps: 1.0e-8

network_dir: "checkpoint_0203_hybrid_sp0500"

training:
  rec_results_freq: 10000
  rec_constraint_freq: 50000
  max_steps: 800000

batch_size:
  inlet: 700
  outlet: 400
  no_slip: 3000
  interior: 4000
  integral_continuity: 200

custom:
  stl_dir: "./stl_files/0203_k1"
  nu: 0.03774
  inlet_vel: 55.18
  auto_inlet_npoints: 20000
  integral_lambda: 0.2
  flow_file: "/home/ucl/elen/ebarette/src/SimVascular/0207_H_CERE_CA/Simulations/Anr_006V1cgsPulsePres/ICA.flow"
  period: 0.95
  n_fourier_modes: 10
  n_train_periods: 1.0
  monitor_time: 0.0
  hybrid_dataset: "/home/ucl/elen/ebarette/src/Meshing/results/hybrid_data/0203/0203_hybrid_SP0500_N20.npz"
  hybrid_lambda: 1.0
  hybrid_batch_size: 2000
  hybrid_supervise_pressure: true
